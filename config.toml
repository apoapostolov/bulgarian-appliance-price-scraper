[scraper]
store = "technomarket"
appliance_type = "refrigerator"

[stores.technomarket]
base_url = "https://www.technomarket.bg"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
output_dir = "output"
render_timeout_ms = 15000
chromium_binaries = ["chromium", "chromium-browser", "google-chrome", "chrome"]

[stores.technomarket.appliance_types.refrigerator]
hub_path = "/hladilnitzi"
category_name_prefix = "Хладилници"
output_prefix = "technobulgarian_scraper_technomarket_refrigerators"
metadata_cache_path = "cache/technomarket/refrigerator_metadata.json"
in_stock_only = true
fetch_product_details = true
category_texts = [
  "С долна камера",
  "С горна камера",
  "Side By Side",
  "С една врата",
  "Хладилни витрини",
  "Фризери",
  "Всички хладилници",
  "Винарни",
]

